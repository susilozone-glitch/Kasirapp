<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kasir App — Preview</title>
<style>
  :root{
    --primary:#2563eb; --primary-shade:#2156cf; --success:#22c55e; --danger:#ef4444;
    --medium:#64748b; --bg:#f4f7fe; --card:#ffffff; --text:#1e293b; --line:rgba(37,99,235,.10);
    color-scheme:light;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text)}
  .app{max-width:1100px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
  header.bar{background:linear-gradient(135deg,#2563eb 0%,#0ea5e9 100%);color:#fff;padding:14px 16px;font-size:1.2rem;font-weight:700;display:flex;justify-content:space-between;align-items:center}
  header.bar .brand{display:flex;align-items:center;gap:8px}
  .ic-svg{width:1em;height:1em;display:inline-block;vertical-align:-.125em;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .tabs{display:flex;border-bottom:1px solid var(--line);background:var(--card)}
  .tab{flex:1;text-align:center;padding:12px;font-weight:600;color:var(--medium);cursor:pointer;border-bottom:3px solid transparent}
  .tab.active{color:var(--primary);border-bottom-color:var(--primary)}
  .body{flex:1;display:flex;min-height:0}
  .products{flex:1;overflow-y:auto;padding:0 0 80px}
  .controls{padding:12px 12px 4px;position:sticky;top:0;background:var(--bg);z-index:2}
  input.search{width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--text);font-size:.95rem}
  .chips{display:flex;gap:6px;overflow-x:auto;padding:10px 0 4px}
  .chip{padding:6px 14px;border-radius:20px;border:1px solid var(--line);background:var(--card);color:var(--medium);cursor:pointer;white-space:nowrap;font-size:.85rem}
  .chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;padding:12px}
  .pcard{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:12px;cursor:pointer;display:flex;flex-direction:column;gap:5px;box-shadow:0 6px 18px rgba(37,99,235,.06);transition:transform .12s,box-shadow .12s}
  .pcard:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(37,99,235,.14)}
  .pcard:active{transform:scale(.96)}
  .pemoji{font-size:32px}
  .pthumb{width:100%;aspect-ratio:1/1;border-radius:10px;overflow:hidden;background:var(--bg);display:flex;align-items:center;justify-content:center}
  .pthumb img{width:100%;height:100%;object-fit:cover;display:block}
  .pthumb-fb{font-size:38px;color:var(--primary);opacity:.5}
  .cthumb{width:42px;height:42px;border-radius:8px;object-fit:cover;flex:0 0 auto}
  .pname{font-weight:600;font-size:.92rem;line-height:1.2}
  .psku{font-size:.7rem;color:var(--medium)}
  .pprice{color:var(--primary);font-weight:700}
  /* cart panel */
  .cart{flex:0 0 360px;border-left:1px solid var(--line);background:var(--card);display:flex;flex-direction:column}
  .cart h2{margin:0;padding:14px 16px;border-bottom:1px solid var(--line);font-size:1rem}
  .citems{flex:1;overflow-y:auto}
  .citem{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--line)}
  .citem .info{flex:1;min-width:0}
  .citem .nm{font-weight:600;font-size:.9rem}
  .citem .sub{font-size:.78rem;color:var(--medium)}
  .qty{display:flex;align-items:center;gap:6px}
  .qbtn{width:28px;height:28px;border-radius:8px;border:1px solid var(--line);background:var(--bg);color:var(--text);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .qval{min-width:22px;text-align:center;font-weight:700}
  .summary{border-top:1px solid var(--line);padding:14px 16px}
  .srow{display:flex;justify-content:space-between;padding:3px 0;font-size:.92rem}
  .srow.total{font-size:1.25rem;font-weight:800;padding-top:8px}
  .srow.total b{color:var(--primary)}
  .btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:8px;color:#fff;background:var(--primary)}
  .btn.success{background:var(--success)} .btn.ghost{background:transparent;color:var(--medium)} .btn.outline{background:transparent;color:var(--primary);border:1px solid var(--primary)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--medium);padding:50px 20px;text-align:center}
  .empty .ic{font-size:48px;opacity:.4}
  /* mobile cart bar */
  .mbar{display:none;position:fixed;left:0;right:0;bottom:0;padding:10px 12px;background:var(--primary);max-width:1100px;margin:0 auto}
  .mbar button{width:100%;padding:12px;border:none;border-radius:10px;background:#fff;color:var(--primary);font-weight:700;font-size:1rem;cursor:pointer}
  /* modal */
  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;align-items:flex-end}
  .modal.open{display:flex}
  .sheet{background:var(--bg);width:100%;max-height:88vh;border-radius:18px 18px 0 0;display:flex;flex-direction:column;overflow:hidden}
  .sheet header{background:var(--primary);color:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;font-weight:700}
  .x{background:none;border:none;color:#fff;font-size:1.4rem;cursor:pointer}
  /* page (checkout/receipt) overlay */
  .page{display:none;position:fixed;inset:0;background:var(--bg);z-index:60;flex-direction:column}
  .page.open{display:flex}
  .page .scroll{flex:1;overflow-y:auto;padding-bottom:90px}
  .field{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--line)}
  .field input{width:130px;text-align:right;padding:8px;border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--text);font-size:1rem}
  .seg{display:flex;gap:6px;padding:8px 16px}
  .seg button{flex:1;padding:11px;border:1px solid var(--primary);background:transparent;color:var(--primary);border-radius:10px;font-weight:600;cursor:pointer}
  .seg button.active{background:var(--primary);color:#fff}
  .footbar{position:fixed;left:0;right:0;bottom:0;max-width:1100px;margin:0 auto;padding:10px 16px;background:var(--card);border-top:1px solid var(--line)}
  .quick{display:flex;flex-wrap:wrap;gap:8px;padding:0 16px}
  .quick button{padding:8px 12px;border:1px solid var(--primary);background:transparent;color:var(--primary);border-radius:8px;cursor:pointer;font-size:.85rem}
  .card-box{background:var(--card);border:1px solid var(--line);border-radius:12px;margin:12px 16px}
  .receipt{max-width:360px;margin:16px auto;background:#fff;color:#1a1a1a;padding:20px;border-radius:10px;box-shadow:0 2px 14px rgba(0,0,0,.12);font-family:'Courier New',monospace}
  .rc{text-align:center} .rline{display:flex;justify-content:space-between;font-size:.85rem;padding:2px 0}
  .rdiv{border:none;border-top:1px dashed #999;margin:8px 0}
  .stats{display:flex;gap:10px;padding:16px;flex-wrap:wrap}
  .stat{flex:1 1 110px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
  .stat .lab{font-size:.75rem;color:var(--medium)} .stat .val{font-size:1.3rem;font-weight:800;color:var(--primary)}
  .stat.wide{flex-basis:100%}
  .hgroup{margin:0 16px 12px;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .hhead{display:flex;justify-content:space-between;padding:10px 14px;font-weight:700;border-bottom:1px solid var(--line)}
  .hitem{display:flex;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--line);cursor:pointer}
  .hitem:last-child{border-bottom:none}
  @media(max-width:767px){ .cart{display:none} .mbar{display:block} }
  @media print{ .receipt{box-shadow:none;margin:0} body *{visibility:hidden} .receipt,.receipt *{visibility:visible} .receipt{position:absolute;left:0;top:0} }
</style>
</head>
<body>
<div class="app">
  <header class="bar"><span class="brand"><svg class="ic-svg" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg> Kasir App</span><span id="clock" style="font-size:.85rem;font-weight:500;opacity:.85"></span></header>
  <div class="tabs">
    <div class="tab active" data-tab="pos" onclick="switchTab('pos')">Kasir</div>
    <div class="tab" data-tab="history" onclick="switchTab('history')">Riwayat</div>
  </div>

  <!-- POS -->
  <div class="body" id="view-pos">
    <div class="products">
      <div class="controls">
        <input class="search" id="search" placeholder="Cari produk atau SKU..." oninput="render()" />
        <div class="chips" id="chips"></div>
      </div>
      <div class="grid" id="grid"></div>
    </div>
    <div class="cart">
      <h2>Keranjang</h2>
      <div id="cartContent" style="flex:1;display:flex;flex-direction:column;min-height:0"></div>
    </div>
  </div>

  <!-- HISTORY -->
  <div id="view-history" style="display:none;flex:1;overflow-y:auto;padding-bottom:20px"></div>

  <div class="mbar" id="mbar"></div>
</div>

<!-- Mobile cart modal -->
<div class="modal" id="cartModal">
  <div class="sheet">
    <header><span>Keranjang</span><button class="x" onclick="closeCart()">×</button></header>
    <div id="cartContentMobile" style="flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden"></div>
  </div>
</div>

<!-- Checkout page -->
<div class="page" id="checkoutPage">
  <header class="bar"><span>← Pembayaran</span><button class="x" onclick="closeCheckout()">×</button></header>
  <div class="scroll" id="checkoutBody"></div>
  <div class="footbar"><button class="btn success" id="payBtn" onclick="pay()">Selesaikan Pembayaran</button></div>
</div>

<!-- Receipt page -->
<div class="page" id="receiptPage">
  <header class="bar"><span>Struk Pembayaran</span><span><button class="x" onclick="printReceipt()" title="Cetak"><svg class="ic-svg" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg></button><button class="x" onclick="closeReceipt()">×</button></span></header>
  <div class="scroll" id="receiptBody"></div>
</div>

<script>
const img = name=>`https://placehold.co/400x400/eef2ff/2563eb?text=${encodeURIComponent(name)}`;
const SVG={
  cart:'<svg class="ic-svg" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>',
  trash:'<svg class="ic-svg" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
  receipt:'<svg class="ic-svg" viewBox="0 0 24 24"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="M8 7h8M8 11h8M8 15h5"/></svg>',
  box:'<svg class="ic-svg" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.7l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.7l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><polyline points="3.3 7 12 12 20.7 7"/><line x1="12" y1="22" x2="12" y2="12"/></svg>'
};
window._kasirBox = SVG.box.replace(/"/g,'&quot;');
const PRODUCTS = [
  {id:'p01',name:'Kopi Hitam',category:'Minuman',price:12000,sku:'DRK-001',image:img('Kopi Hitam')},
  {id:'p02',name:'Es Teh Manis',category:'Minuman',price:8000,sku:'DRK-002',image:img('Es Teh Manis')},
  {id:'p03',name:'Cappuccino',category:'Minuman',price:22000,sku:'DRK-003',image:img('Cappuccino')},
  {id:'p04',name:'Jus Alpukat',category:'Minuman',price:18000,sku:'DRK-004',image:img('Jus Alpukat')},
  {id:'p05',name:'Air Mineral',category:'Minuman',price:5000,sku:'DRK-005',image:img('Air Mineral')},
  {id:'p06',name:'Nasi Goreng',category:'Makanan',price:25000,sku:'FD-001',image:img('Nasi Goreng')},
  {id:'p07',name:'Mie Ayam',category:'Makanan',price:20000,sku:'FD-002',image:img('Mie Ayam')},
  {id:'p08',name:'Ayam Goreng',category:'Makanan',price:23000,sku:'FD-003',image:img('Ayam Goreng')},
  {id:'p09',name:'Sate Ayam',category:'Makanan',price:28000,sku:'FD-004',image:img('Sate Ayam')},
  {id:'p10',name:'Gado-Gado',category:'Makanan',price:19000,sku:'FD-005',image:img('Gado-Gado')},
  {id:'p11',name:'Pisang Goreng',category:'Snack',price:10000,sku:'SN-001',image:img('Pisang Goreng')},
  {id:'p12',name:'Roti Bakar',category:'Snack',price:14000,sku:'SN-002',image:img('Roti Bakar')},
  {id:'p13',name:'Kentang Goreng',category:'Snack',price:16000,sku:'SN-003',image:img('Kentang Goreng')},
  {id:'p14',name:'Donat',category:'Snack',price:9000,sku:'SN-004',image:img('Donat')},
  {id:'p15',name:'Es Krim',category:'Dessert',price:15000,sku:'DS-001',image:img('Es Krim')},
  {id:'p16',name:'Puding Coklat',category:'Dessert',price:12000,sku:'DS-002',image:img('Puding Coklat')},
];
const CATEGORIES = ['Semua','Minuman','Makanan','Snack','Dessert'];
const TAX_RATE = 0.11;
const STORE = {name:'KASIR APP',address:'Jl. Merdeka No. 123, Jakarta',phone:'021-555-0100'};

let cart = [];          // {product, qty}
let discount = 0;
let category = 'Semua';
let payMethod = 'cash';
let paid = 0;
let sales = loadSales();
let lastSale = null;

const idr = n => new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',maximumFractionDigits:0}).format(n||0);
const dt = iso => new Date(iso).toLocaleString('id-ID',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
const dd = iso => new Date(iso).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});

function loadSales(){ try{return JSON.parse(localStorage.getItem('kasir.sales.v1'))||[]}catch{return[]} }
function persist(){ localStorage.setItem('kasir.sales.v1',JSON.stringify(sales)); }

function totals(){
  const subtotal = cart.reduce((s,i)=>s+i.product.price*i.qty,0);
  const itemCount = cart.reduce((s,i)=>s+i.qty,0);
  const disc = Math.min(discount,subtotal);
  const taxable = subtotal-disc;
  const tax = Math.round(taxable*TAX_RATE);
  return {subtotal,itemCount,discount:disc,tax,total:taxable+tax};
}
function addItem(p){ const f=cart.find(i=>i.product.id===p.id); if(f)f.qty++; else cart.push({product:p,qty:1}); render(); }
function setQty(id,q){ if(q<=0)cart=cart.filter(i=>i.product.id!==id); else cart.find(i=>i.product.id===id).qty=q; render(); }
function removeItem(id){ cart=cart.filter(i=>i.product.id!==id); render(); }
function clearCart(){ cart=[]; discount=0; render(); }

function switchTab(t){
  document.querySelectorAll('.tab').forEach(e=>e.classList.toggle('active',e.dataset.tab===t));
  document.getElementById('view-pos').style.display = t==='pos'?'flex':'none';
  document.getElementById('view-history').style.display = t==='history'?'block':'none';
  document.getElementById('mbar').style.display = t==='pos'?'':'none';
  if(t==='history') renderHistory();
}

function render(){
  // chips
  document.getElementById('chips').innerHTML = CATEGORIES.map(c=>
    `<div class="chip ${c===category?'active':''}" onclick="category='${c}';render()">${c}</div>`).join('');
  // grid
  const q = (document.getElementById('search').value||'').toLowerCase();
  const list = PRODUCTS.filter(p=>(category==='Semua'||p.category===category)&&(!q||p.name.toLowerCase().includes(q)||p.sku.toLowerCase().includes(q)));
  document.getElementById('grid').innerHTML = list.length? list.map(p=>
    `<div class="pcard" onclick="addItem(${JSON.stringify(p).replace(/"/g,'&quot;')})">
      <div class="pthumb"><img src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.parentNode.innerHTML='<span class=&quot;pthumb-fb&quot;>'+_kasirBox+'</span>'"></div>
      <span class="pname">${p.name}</span>
      <span class="psku">${p.sku}</span><span class="pprice">${idr(p.price)}</span></div>`).join('')
    : '<div class="empty" style="grid-column:1/-1"><p>Tidak ada produk ditemukan</p></div>';
  renderCart();
}

function cartHTML(){
  const t = totals();
  if(!cart.length) return '<div class="empty"><div class="ic" style="font-size:48px;color:var(--primary);opacity:.4">'+SVG.cart+'</div><p>Keranjang masih kosong</p><small>Tap produk untuk menambahkan</small></div>';
  const items = cart.map(i=>`<div class="citem">
      <img class="cthumb" src="${i.product.image}" alt="" onerror="this.style.display='none'">
      <div class="info"><div class="nm">${i.product.name}</div>
        <div class="sub">${idr(i.product.price)} × ${i.qty} = ${idr(i.product.price*i.qty)}</div></div>
      <div class="qty"><button class="qbtn" onclick="setQty('${i.product.id}',${i.qty-1})">−</button>
        <span class="qval">${i.qty}</span>
        <button class="qbtn" onclick="setQty('${i.product.id}',${i.qty+1})">+</button>
        <button class="qbtn" style="color:var(--danger)" onclick="removeItem('${i.product.id}')">${SVG.trash}</button></div></div>`).join('');
  return `<div class="citems">${items}</div>
    <div class="summary">
      <div class="srow"><span>Subtotal (${t.itemCount} item)</span><span>${idr(t.subtotal)}</span></div>
      <div class="srow total"><span>Total</span><b>${idr(t.subtotal)}</b></div>
      <button class="btn" onclick="openCheckout()">Bayar · ${idr(t.subtotal)}</button>
      <button class="btn ghost" onclick="clearCart()">Kosongkan Keranjang</button>
    </div>`;
}
function renderCart(){
  document.getElementById('cartContent').innerHTML = cartHTML();
  document.getElementById('cartContentMobile').innerHTML = cartHTML();
  const t = totals();
  document.getElementById('mbar').innerHTML = t.itemCount? `<button onclick="openCart()">${SVG.cart} ${t.itemCount} item · ${idr(t.subtotal)}</button>`:'';
}

function openCart(){ document.getElementById('cartModal').classList.add('open'); }
function closeCart(){ document.getElementById('cartModal').classList.remove('open'); }

// CHECKOUT
function openCheckout(){ if(!cart.length)return; closeCart(); paid=0; payMethod='cash'; renderCheckout(); document.getElementById('checkoutPage').classList.add('open'); }
function closeCheckout(){ document.getElementById('checkoutPage').classList.remove('open'); }
function setMethod(m){ payMethod=m; paid=0; renderCheckout(); }
function setPaid(v){ paid=Number(v)||0; renderCheckout(); }
function setDiscount(v){ discount=Math.max(0,Number(v)||0); renderCheckout(); renderCart(); }

function renderCheckout(){
  const t = totals();
  const change = Math.max(0,paid-t.total);
  const quick=[t.total,50000,100000,150000,200000].filter((v,i,a)=>v>=t.total&&a.indexOf(v)===i).slice(0,4);
  document.getElementById('checkoutBody').innerHTML = `
    <div class="card-box">${cart.map(i=>`<div class="field"><span>${i.product.name} <small style="color:var(--medium)">×${i.qty}</small></span><span>${idr(i.product.price*i.qty)}</span></div>`).join('')}</div>
    <div class="field"><span>Diskon (Rp)</span><input type="number" value="${discount||''}" placeholder="0" oninput="setDiscount(this.value)"></div>
    <div class="card-box" style="padding:12px 16px">
      <div class="srow"><span>Subtotal</span><span>${idr(t.subtotal)}</span></div>
      <div class="srow"><span>Diskon</span><span>− ${idr(t.discount)}</span></div>
      <div class="srow"><span>PPN (11%)</span><span>${idr(t.tax)}</span></div>
      <div class="srow total"><span>Total</span><b>${idr(t.total)}</b></div>
    </div>
    <div style="padding:8px 16px;font-weight:700">Metode Pembayaran</div>
    <div class="seg">
      <button class="${payMethod==='cash'?'active':''}" onclick="setMethod('cash')">Tunai</button>
      <button class="${payMethod==='card'?'active':''}" onclick="setMethod('card')">Kartu</button>
      <button class="${payMethod==='qris'?'active':''}" onclick="setMethod('qris')">QRIS</button>
    </div>
    ${payMethod==='cash'?`
      <div class="field" style="flex-direction:column;align-items:stretch;gap:6px">
        <span style="color:var(--medium);font-size:.85rem">Uang Diterima</span>
        <input type="number" style="width:100%;text-align:left" value="${paid||''}" placeholder="0" oninput="setPaid(this.value)">
      </div>
      <div class="quick">${quick.map(v=>`<button onclick="setPaid(${v})">${v===t.total?'Uang Pas':idr(v)}</button>`).join('')}</div>
      <div class="card-box" style="padding:10px 16px"><div class="srow total"><span>Kembalian</span><b>${idr(change)}</b></div></div>`:''}
  `;
  const btn=document.getElementById('payBtn');
  const can = cart.length && (payMethod!=='cash'||paid>=t.total);
  btn.disabled=!can; btn.textContent=`Selesaikan Pembayaran · ${idr(t.total)}`;
}

function pay(){
  const t=totals();
  if(payMethod==='cash'&&paid<t.total)return;
  const amountPaid = payMethod==='cash'?paid:t.total;
  const sale={id:'INV-'+Date.now(),createdAt:new Date().toISOString(),items:cart.map(i=>({...i})),
    subtotal:t.subtotal,discount:t.discount,taxRate:TAX_RATE,tax:t.tax,total:t.total,
    paymentMethod:payMethod,amountPaid,change:payMethod==='cash'?amountPaid-t.total:0};
  sales.unshift(sale); persist(); lastSale=sale;
  clearCart(); closeCheckout(); showReceipt(sale);
}

// RECEIPT
const payLabel=m=>m==='cash'?'Tunai':m==='card'?'Kartu':'QRIS';
function showReceipt(s){
  document.getElementById('receiptBody').innerHTML = `
    <div class="receipt" id="receiptPaper">
      <div class="rc"><h2 style="margin:0">${STORE.name}</h2><div style="font-size:.78rem">${STORE.address}</div><div style="font-size:.78rem">${STORE.phone}</div></div>
      <hr class="rdiv">
      <div class="rline"><span>No</span><span>${s.id}</span></div>
      <div class="rline"><span>Tanggal</span><span>${dt(s.createdAt)}</span></div>
      <hr class="rdiv">
      ${s.items.map(i=>`<div style="margin-bottom:4px"><div style="font-size:.85rem">${i.product.name}</div><div class="rline" style="color:#555;font-size:.78rem"><span>${i.qty} × ${idr(i.product.price)}</span><span>${idr(i.product.price*i.qty)}</span></div></div>`).join('')}
      <hr class="rdiv">
      <div class="rline"><span>Subtotal</span><span>${idr(s.subtotal)}</span></div>
      ${s.discount>0?`<div class="rline"><span>Diskon</span><span>− ${idr(s.discount)}</span></div>`:''}
      <div class="rline"><span>PPN (11%)</span><span>${idr(s.tax)}</span></div>
      <div class="rline" style="font-weight:700"><span>TOTAL</span><span>${idr(s.total)}</span></div>
      <hr class="rdiv">
      <div class="rline"><span>Bayar (${payLabel(s.paymentMethod)})</span><span>${idr(s.amountPaid)}</span></div>
      ${s.paymentMethod==='cash'?`<div class="rline"><span>Kembali</span><span>${idr(s.change)}</span></div>`:''}
      <hr class="rdiv"><div class="rc" style="font-size:.8rem">Terima kasih atas kunjungan Anda!</div>
    </div>
    <div style="max-width:360px;margin:0 auto;padding:0 0 30px"><button class="btn" onclick="closeReceipt()">+ Transaksi Baru</button></div>`;
  document.getElementById('receiptPage').classList.add('open');
}
function closeReceipt(){ document.getElementById('receiptPage').classList.remove('open'); switchTab('pos'); }
function printReceipt(){ window.print(); }

// HISTORY
function renderHistory(){
  const today=new Date().toDateString();
  const todays=sales.filter(s=>new Date(s.createdAt).toDateString()===today);
  const rev=todays.reduce((a,s)=>a+s.total,0);
  const itemsSold=todays.reduce((a,s)=>a+s.items.reduce((q,i)=>q+i.qty,0),0);
  const groups={};
  sales.forEach(s=>{const k=new Date(s.createdAt).toDateString();(groups[k]=groups[k]||[]).push(s)});
  let html=`<div class="stats">
    <div class="stat"><div class="lab">Transaksi Hari Ini</div><div class="val">${todays.length}</div></div>
    <div class="stat"><div class="lab">Item Terjual</div><div class="val">${itemsSold}</div></div>
    <div class="stat wide"><div class="lab">Omzet Hari Ini</div><div class="val">${idr(rev)}</div></div></div>`;
  if(!sales.length){ html+='<div class="empty"><div class="ic" style="font-size:48px;color:var(--primary);opacity:.4">'+SVG.receipt+'</div><p>Belum ada transaksi</p></div>'; }
  else {
    html += Object.keys(groups).map(day=>{
      const ds=groups[day]; const tot=ds.reduce((a,s)=>a+s.total,0);
      return `<div class="hgroup"><div class="hhead"><span>${dd(ds[0].createdAt)}</span><span style="color:var(--primary)">${idr(tot)}</span></div>
        ${ds.map(s=>{const q=s.items.reduce((a,i)=>a+i.qty,0);return `<div class="hitem" onclick='showReceipt(${JSON.stringify(s).replace(/'/g,"&#39;")})'>
          <div><div style="font-weight:600">${s.id}</div><div style="font-size:.78rem;color:var(--medium)">${dt(s.createdAt)} · ${q} item</div></div>
          <div style="font-weight:700;color:var(--primary)">${idr(s.total)}</div></div>`}).join('')}</div>`;
    }).join('');
    html += `<div style="padding:0 16px 30px"><button class="btn ghost" onclick="if(confirm('Hapus semua riwayat?')){sales=[];persist();renderHistory()}">Hapus Riwayat</button></div>`;
  }
  document.getElementById('view-history').innerHTML=html;
}

setInterval(()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})},1000);
render();
</script>
